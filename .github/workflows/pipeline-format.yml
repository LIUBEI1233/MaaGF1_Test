name: Pipeline JSON Formatter

on:
  push:
    branches:
      - "**"
    paths:
      - "assets/resource/pipeline/**/*.json"
      - "assets/resource_en/pipeline/**/*.json"
      - "assets/interface.json"
      - ".github/workflows/pipeline-format.yml"
      - "tools/maapipeline-format/**"
  pull_request:
    branches:
      - "**"
    paths:
      - "assets/resource/pipeline/**/*.json"
      - "assets/resource_en/pipeline/**/*.json"
      - "assets/interface.json"
      - ".github/workflows/pipeline-format.yml"
      - "tools/maapipeline-format/**"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  format:
    name: Format Pipeline JSON Files
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository with submodules
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
          submodules: 'recursive'
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Verify formatter tool
        run: |
          if [ ! -f "tools/maapipeline-format/src/main.py" ]; then
            echo "[FAIL] Formatter tool not found"
            echo "Please ensure Git Submodule is properly initialized"
            exit 1
          fi
          echo "[OK] Formatter tool found"
      
      - name: Check for target files
        id: check_files
        run: |
          FILES_FOUND=false
          TOTAL_COUNT=0
          
          # Check 1: Standard Tasks
          if [ -d "assets/resource/pipeline/tasks" ]; then
            COUNT=$(find assets/resource/pipeline/tasks -name "*.json" -type f | wc -l)
            if [ "$COUNT" -gt 0 ]; then
              echo "[INFO] Found standard pipeline tasks ($COUNT files)"
              FILES_FOUND=true
              TOTAL_COUNT=$((TOTAL_COUNT + COUNT))
            fi
          fi

          # Check 2: EN Resource Pipeline
          if [ -d "assets/resource_en/pipeline" ]; then
            COUNT=$(find assets/resource_en/pipeline -name "*.json" -type f | wc -l)
            if [ "$COUNT" -gt 0 ]; then
              echo "[INFO] Found EN pipeline files ($COUNT files)"
              FILES_FOUND=true
              TOTAL_COUNT=$((TOTAL_COUNT + COUNT))
            fi
          fi

          # Check 3: Interface JSON
          if [ -f "assets/interface.json" ]; then
            echo "[INFO] Found assets/interface.json"
            FILES_FOUND=true
            TOTAL_COUNT=$((TOTAL_COUNT + 1))
          fi
          
          if [ "$FILES_FOUND" = "false" ]; then
            echo "[WARN] No relevant JSON files found to process"
            echo "files_exist=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          echo "files_exist=true" >> $GITHUB_OUTPUT
          echo "file_count=$TOTAL_COUNT" >> $GITHUB_OUTPUT
          echo "[OK] Found total $TOTAL_COUNT JSON files to process"
      
      - name: Generate diffs (before formatting)
        id: generate_diffs
        if: steps.check_files.outputs.files_exist == 'true'
        run: |
          # Create base diff directory
          mkdir -p pipeline_diffs
          
          # --- Target 1: Standard Tasks ---
          if [ -d "assets/resource/pipeline/tasks" ]; then
            echo "[INFO] Generating diffs for Standard Tasks..."
            mkdir -p pipeline_diffs/tasks
            python tools/maapipeline-format/src/main.py \
              assets/resource/pipeline/tasks \
              --diff-only \
              --diff-dir pipeline_diffs/tasks \
              --yes
          fi

          # --- Target 2: EN Resource Pipeline ---
          if [ -d "assets/resource_en/pipeline" ]; then
            echo "[INFO] Generating diffs for EN Pipeline..."
            mkdir -p pipeline_diffs/en
            python tools/maapipeline-format/src/main.py \
              assets/resource_en/pipeline \
              --diff-only \
              --diff-dir pipeline_diffs/en \
              --yes
          fi

          # --- Target 3: Interface JSON (Single File Workaround) ---
          if [ -f "assets/interface.json" ]; then
            echo "[INFO] Generating diffs for interface.json..."
            # Create temp dir to mimic folder structure for the tool
            mkdir -p .temp_fmt/interface
            cp assets/interface.json .temp_fmt/interface/
            
            mkdir -p pipeline_diffs/interface
            
            python tools/maapipeline-format/src/main.py \
              .temp_fmt/interface \
              --diff-only \
              --diff-dir pipeline_diffs/interface \
              --yes
            
            # Clean up temp
            rm -rf .temp_fmt
            
            # Fix the path in the diff file to point to the real location
            # The tool likely generated diff header as a/interface.json
            # We want it to look like it came from assets/interface.json for context
            if [ -f "pipeline_diffs/interface/interface.json.diff" ]; then
                sed -i 's|a/interface.json|a/assets/interface.json|g' pipeline_diffs/interface/interface.json.diff
                sed -i 's|b/interface.json|b/assets/interface.json|g' pipeline_diffs/interface/interface.json.diff
            fi
          fi
          
          # Check if any diffs were generated
          DIFF_COUNT=$(find pipeline_diffs -name '*.diff' -type f | wc -l)
          
          if [ "$DIFF_COUNT" -gt 0 ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "diff_count=$DIFF_COUNT" >> $GITHUB_OUTPUT
            echo "[OK] Generated $DIFF_COUNT diff files"
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "diff_count=0" >> $GITHUB_OUTPUT
            echo "[INFO] No formatting changes needed"
          fi
      
      - name: Format JSON files (in-place)
        id: format_files
        if: steps.check_files.outputs.files_exist == 'true' && steps.generate_diffs.outputs.has_changes == 'true'
        run: |
          # --- Target 1: Standard Tasks ---
          if [ -d "assets/resource/pipeline/tasks" ]; then
            echo "[INFO] Formatting Standard Tasks..."
            python tools/maapipeline-format/src/main.py \
              assets/resource/pipeline/tasks \
              --in-place \
              --yes
          fi

          # --- Target 2: EN Resource Pipeline ---
          if [ -d "assets/resource_en/pipeline" ]; then
            echo "[INFO] Formatting EN Pipeline..."
            python tools/maapipeline-format/src/main.py \
              assets/resource_en/pipeline \
              --in-place \
              --yes
          fi

          # --- Target 3: Interface JSON (Single File Workaround) ---
          if [ -f "assets/interface.json" ]; then
            echo "[INFO] Formatting interface.json..."
            # Create temp dir
            mkdir -p .temp_fmt/interface
            cp assets/interface.json .temp_fmt/interface/
            
            # Format in temp
            python tools/maapipeline-format/src/main.py \
              .temp_fmt/interface \
              --in-place \
              --yes
            
            # Copy back
            cp .temp_fmt/interface/interface.json assets/interface.json
            rm -rf .temp_fmt
          fi
          
          echo "[OK] Files formatted successfully"
      
      - name: Check for Git changes
        id: git_diff
        if: steps.format_files.conclusion == 'success'
        run: |
          git diff --name-only
          
          if [ -n "$(git status --porcelain)" ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
            CHANGED_COUNT=$(git diff --name-only | wc -l)
            echo "changed_files=$CHANGED_COUNT" >> $GITHUB_OUTPUT
            echo "[OK] Detected $CHANGED_COUNT changed files"
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "changed_files=0" >> $GITHUB_OUTPUT
            echo "[INFO] No Git changes detected"
          fi
      
      - name: Generate summary with diff preview
        if: steps.generate_diffs.outputs.has_changes == 'true'
        run: |
          cat >> $GITHUB_STEP_SUMMARY << 'SUMMARY_EOF'
          # Pipeline JSON Formatting Report
          
          ## Summary
          
          | Metric | Value |
          |--------|-------|
          | Files Checked | ${{ steps.check_files.outputs.file_count }} |
          | Files with Changes | ${{ steps.generate_diffs.outputs.diff_count }} |
          | Status | ✅ Formatted |
          
          SUMMARY_EOF
          
          # Add diff preview
          if [ "${{ steps.generate_diffs.outputs.has_changes }}" = "true" ]; then
            cat >> $GITHUB_STEP_SUMMARY << 'SUMMARY_EOF'
          
          ## Diff Preview (First 5 Files)
          
          SUMMARY_EOF
            
            FILE_COUNT=0
            # Find diffs recursively
            for DIFF_FILE in $(find pipeline_diffs -name '*.diff' -type f | head -n 5); do
              # Clean up path for display (remove pipeline_diffs/ prefix)
              # This will show as "tasks/Farm/..." or "interface/interface.json.diff"
              DISPLAY_PATH=$(echo "$DIFF_FILE" | sed 's|^pipeline_diffs/||')
              
              cat >> $GITHUB_STEP_SUMMARY << SUMMARY_EOF
          
          ### \`$DISPLAY_PATH\`
          
          \`\`\`diff
          SUMMARY_EOF
              
              # Show first 50 lines
              head -n 50 "$DIFF_FILE" >> $GITHUB_STEP_SUMMARY
              
              TOTAL_LINES=$(wc -l < "$DIFF_FILE")
              if [ $TOTAL_LINES -gt 50 ]; then
                cat >> $GITHUB_STEP_SUMMARY << SUMMARY_EOF
          
          ... (truncated, $TOTAL_LINES total lines)
          SUMMARY_EOF
              fi
              
              cat >> $GITHUB_STEP_SUMMARY << 'SUMMARY_EOF'
          ```
          
          SUMMARY_EOF
              
              FILE_COUNT=$((FILE_COUNT + 1))
            done
          fi
      
      - name: Upload diff artifacts
        if: steps.generate_diffs.outputs.has_changes == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-format-diffs-${{ github.run_number }}
          path: pipeline_diffs/**/*.diff
          retention-days: 30
      
      - name: Commit formatted files
        if: steps.git_diff.outputs.has_changes == 'true'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "Pipeline Format Bot"
          
          # Add all potential targets
          git add assets/resource/pipeline/**/*.json || true
          git add assets/resource_en/pipeline/**/*.json || true
          git add assets/interface.json || true
          
          cat > commit_message.txt << 'COMMIT_EOF'
          Auto-format pipeline JSON files
          
          - Formatted ${{ steps.git_diff.outputs.changed_files }} files using MaaPipeline-Format
          - Standardized JSON formatting with configured rules
          - Validated JSON syntax and structure
          
          Formatting changes:
          - Consistent indentation (4 spaces)
          - Coordinate fields kept inline
          - Control flow fields split across lines
          - Comments preserved where possible
          
          Co-authored-by: github-actions[bot] <github-actions[bot]@users.noreply.github.com>
          COMMIT_EOF
          
          git commit -F commit_message.txt
          rm commit_message.txt
      
      - name: Push changes
        if: steps.git_diff.outputs.has_changes == 'true'
        run: |
          BRANCH_NAME=${GITHUB_HEAD_REF:-${GITHUB_REF#refs/heads/}}
          echo "[INFO] Pushing to branch: $BRANCH_NAME"
          
          git push origin $BRANCH_NAME